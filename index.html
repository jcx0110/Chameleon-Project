<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroEmbody Project Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p id="conference" class="conference-tag"></p>
        <h1 id="paper-title"></h1>
        <p id="paper-subtitle" class="subtitle"></p>
        <p id="authors" class="authors"></p>
        <div id="quick-links" class="quick-links"></div>
      </div>
    </header>

    <main class="container">
      <section id="abstract" class="section">
        <h2>Abstract</h2>
        <p id="abstract-text"></p>
      </section>

      <section id="method" class="section">
        <h2>Method</h2>
        <p id="method-text"></p>
      </section>

      <section id="results" class="section">
        <h2>Results</h2>
        <p id="results-text"></p>
      </section>

      <section id="gallery" class="section">
        <h2>Figures</h2>
        <div id="gallery-grid" class="grid"></div>
      </section>

      <section id="demos" class="section">
        <h2>Demos</h2>
        <div id="demo-grid" class="grid"></div>
      </section>

      <section id="citation" class="section">
        <h2>Citation</h2>
        <pre id="bibtex-box" class="bibtex"></pre>
        <button id="copy-bibtex" type="button">Copy BibTeX</button>
      </section>

      <section id="contact" class="section">
        <h2>Contact</h2>
        <p id="contact-note"></p>
        <p>
          <a id="contact-email" href="#">your-email@example.com</a>
        </p>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <small>Template for academic project pages on GitHub Pages.</small>
      </div>
    </footer>

    <script src="config/site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
