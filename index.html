<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroEmbody Project Page</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p id="conference" class="conference-tag"></p>
        <div class="hero-layout">
          <div class="hero-text">
            <h1 id="paper-title"></h1>
            <p id="paper-subtitle" class="subtitle"></p>
            <p id="authors" class="authors"></p>
            <div id="quick-links" class="quick-links"></div>
          </div>
          <div class="hero-media">
            <video id="teaser-video" controls muted playsinline preload="metadata"></video>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="motivation" class="section">
        <h2>Motivation</h2>
        <p id="motivation-text"></p>
        <p id="motivation-prompt" class="motivation-prompt"></p>
        <div id="motivation-lanes" class="lanes"></div>
        <div id="motivation-options" class="options-row"></div>
        <p id="motivation-result" class="quiz-result"></p>
      </section>

      <section id="method" class="section">
        <h2>Method</h2>
        <div class="method-video-wrap">
          <video id="method-video" controls muted playsinline preload="metadata"></video>
        </div>
        <p id="method-text"></p>
      </section>

      <section id="dataset" class="section">
        <h2>Dataset</h2>
        <p id="dataset-text"></p>
        <div id="dataset-task-grid" class="grid"></div>
      </section>

      <section id="demos" class="section">
        <h2>Demos</h2>
        <div id="demo-grid" class="grid"></div>
      </section>

      <section id="acknowledgement" class="section">
        <h2>Acknowledgement</h2>
        <p id="acknowledgement-text"></p>
      </section>

      <section id="citation" class="section">
        <h2>Citations</h2>
        <pre id="bibtex-box" class="bibtex"></pre>
        <button id="copy-bibtex" type="button">Copy BibTeX</button>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <small>Template for academic project pages on GitHub Pages.</small>
      </div>
    </footer>

    <script src="config/site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
